services:
  ozy-db:
    image: postgres:17-alpine
    container_name: ozy_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-ozy_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bunker_secret_2026}
      POSTGRES_DB: ${DB_NAME:-ozy_db}
    ports:
      - "5432:5432"
    volumes:
      - ozy_db_data:/var/lib/postgresql/data

  ozy-cache:
    image: redis:7-alpine
    container_name: ozy_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  ozy_db_data:
